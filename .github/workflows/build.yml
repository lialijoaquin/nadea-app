name: Build Nadea APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Instalar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            libltdl-dev zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config cmake

      - name: Instalar buildozer y cython
        run: |
          pip install buildozer==1.5.0
          pip install cython==3.0.11

      - name: Compilar APK
        run: buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: nadea-debug-apk
          path: bin/*.apk
